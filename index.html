<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5DMAX</title>
    <style>
        :root {
            --glow-red: #ff1a00;
            --glow-orange: #ff5500;
            --glow-blue: #6366f1;
            --bg-dark: #0a0c10;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body { 
            font-family: 'Courier New', Courier, monospace, sans-serif; 
            background: radial-gradient(circle at center, #141923 0%, #07090d 100%);
            color: #e2e8f0; 
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center;
            padding: 40px 20px;
            overflow-x: hidden;
            position: relative;
        }

        /* Футуристичный HUD фон */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px) 0 0 / 40px 40px,
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px) 0 0 / 40px 40px;
            z-index: 0;
            pointer-events: none;
        }

        /* Бегущие Sci-Fi линии на фоне */
        .bg-lines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
            background: linear-gradient(180deg, rgba(239, 64, 64, 0) 0%, rgba(239, 64, 64, 0.1) 50%, rgba(239, 64, 64, 0) 100%);
            animation: scanline 8s linear infinite;
        }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* Главный командный терминал */
        .hud-terminal {
            width: 100%;
            max-width: 1400px;
            background: rgba(10, 14, 22, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8), inset 0 0 30px rgba(99, 102, 241, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            z-index: 1;
        }

        /* Угловые декоративные элементы в стиле Sci-Fi */
        .hud-terminal::before, .hud-terminal::after {
            content: ""; position: absolute; width: 20px; height: 20px; border-color: var(--glow-red); border-style: solid; pointer-events: none;
        }
        .hud-terminal::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-top-left-radius: 20px; }
        .hud-terminal::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-bottom-right-radius: 20px; }

        /* Верхняя панель управления и инфографика */
        .hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
            padding-bottom: 20px;
            margin-bottom: 35px;
        }

        .brand-zone {
            display: flex;
            flex-direction: column;
        }

        .team-title {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 26, 0, 0.6);
            animation: textGlitch 4s infinite;
        }

        .team-meta-stats {
            display: flex;
            gap: 20px;
        }

        .meta-box {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 8px;
            text-align: right;
        }

        .meta-label { font-size: 11px; color: #64748b; text-transform: uppercase; }
        .meta-val { font-size: 18px; font-weight: bold; color: #fff; margin-top: 2px; }

        /* Сетка состава */
        .roster-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 25px;
        }

        /* Карточка игрока */
        .tilt-card {
            background: linear-gradient(135deg, rgba(20, 26, 38, 0.8) 0%, rgba(13, 17, 24, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            cursor: pointer;
        }

        .card-inner-link {
            text-decoration: none;
            color: inherit;
            display: block;
            height: 100%;
        }

        /* Эффект наведения */
        .tilt-card:hover {
            transform: translateY(-7px) scale(1.03);
        }

        /* Индивидуальные эффекты подсветок уровней */
        .card-lvl-10:hover { border-color: rgba(255, 26, 0, 0.6); box-shadow: 0 0 35px rgba(255, 26, 0, 0.3); }
        .card-lvl-9:hover { border-color: rgba(255, 102, 0, 0.4); box-shadow: 0 0 35px rgba(255, 102, 0, 0.18); }
        .card-lvl-8:hover { border-color: rgba(255, 85, 0, 0.5); box-shadow: 0 0 35px rgba(255, 85, 0, 0.25); }

        /* Аватар */
        .avatar-frame {
            width: 100%;
            aspect-ratio: 1/1;
            background: #090b0e;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .avatar-img {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .tilt-card:hover .avatar-img { transform: scale(1.08); }
        .avatar-placeholder { font-size: 64px; color: #1e293b; font-weight: 900; }

        /* Уровни FACEIT */
        .level-badge-3d {
            position: absolute; top: 12px; right: 12px;
            width: 34px; height: 34px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #fff; border-radius: 8px; font-size: 15px;
            z-index: 10;
        }
        .l-10 { 
            background: var(--glow-red); 
            box-shadow: 0 0 15px var(--glow-red), 0 4px 10px rgba(0,0,0,0.5); 
            animation: pulseGlow 1.5s infinite alternate; 
        }
        .l-9 { background: #ff6600; box-shadow: 0 0 10px rgba(255, 102, 0, 0.5); }
        .l-8 { background: var(--glow-orange); box-shadow: 0 0 10px rgba(255, 85, 0, 0.5); }

        @keyframes pulseGlow {
            0% { box-shadow: 0 0 8px var(--glow-red); }
            100% { box-shadow: 0 0 25px var(--glow-red), 0 4px 15px rgba(255, 26, 0, 0.6); }
        }

        /* Информационный блок игрока */
        .info-frame {
            padding: 20px 18px;
            background: rgba(7, 9, 14, 0.4);
        }

        .p-nick { font-size: 21px; font-weight: 900; color: #fff; letter-spacing: 1px; text-transform: uppercase; }
        
        /* Прокачанные роли игроков (Строгий единый стиль) */
        .p-position { 
            display: inline-block;
            font-size: 11px; 
            font-weight: 900;
            text-transform: uppercase; 
            margin-top: 10px; 
            letter-spacing: 2px; 
            padding: 4px 10px;
            border-radius: 6px;
            color: #38bdf8; 
            border: 1px solid rgba(56, 189, 248, 0.3); 
            background: rgba(56, 189, 248, 0.05);
        }

        /* Блок детальной статистики */
        .stats-frame {
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(5, 7, 10, 0.6);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Премиальный блок ELO */
        .elo-premium-block {
            background: linear-gradient(90deg, rgba(99, 102, 241, 0.08) 0%, rgba(79, 70, 229, 0.02) 100%);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            box-shadow: inset 0 0 10px rgba(99, 102, 241, 0.05);
        }
        .elo-label-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .elo-main-label { font-size: 11px; color: #6366f1; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }
        .elo-sub-label { font-size: 8px; color: #475569; letter-spacing: 0.5px; text-transform: uppercase; }
        
        /* Стилизация цифр ELO под цвет уровня */
        .elo-value { font-size: 20px; font-weight: 900; font-family: 'Courier New', monospace; }
        .num-lvl-10 { color: #ff1a00; text-shadow: 0 0 10px rgba(255, 26, 0, 0.4); }
        .num-lvl-9 { color: #ff6600; text-shadow: 0 0 10px rgba(255, 102, 0, 0.3); }
        .num-lvl-8 { color: #ff5500; text-shadow: 0 0 10px rgba(255, 85, 0, 0.3); }

        .stat-row-premium {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #94a3b8;
        }

        .value-premium { color: #fff; font-weight: bold; font-size: 14px; }

        /* Специальный HUD-тег K/D */
        .kd-hud-tag {
            padding: 4px 12px; border-radius: 5px; font-weight: 900; font-size: 13px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
        }
        .kd-godlike { color: #4ade80; border-color: rgba(74, 222, 128, 0.3); background: rgba(74, 222, 128, 0.05); text-shadow: 0 0 5px rgba(74, 222, 128, 0.3); }

        /* Прогресс бары */
        .bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.03); border-radius: 3px; margin-top: 6px; overflow: hidden; border: 1px solid rgba(255,255,255,0.02); }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #818cf8, #4f46e5); border-radius: 3px; width: 0%; transition: width 1s ease-out; }

        /* Поиск 5-го игрока */
        .searching-node {
            border: 2px dashed rgba(74, 222, 128, 0.2);
            background: rgba(74, 222, 128, 0.02);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 350px;
        }
        .searching-node:hover {
            border-color: #4ade80;
            background: rgba(74, 222, 128, 0.05);
            box-shadow: 0 0 30px rgba(74, 222, 128, 0.15);
        }
        .search-glitch {
            color: #4ade80; font-weight: 900; font-size: 18px; text-transform: uppercase; letter-spacing: 3px;
            animation: pulseGlowGreen 2s infinite alternate;
        }

        @keyframes pulseGlowGreen {
            0% { text-shadow: 0 0 5px rgba(74, 222, 128, 0.4); opacity: 0.7; }
            100% { text-shadow: 0 0 15px rgba(74, 222, 128, 0.9); opacity: 1; }
        }

        @keyframes textGlitch {
            0%, 100% { transform: skew(0deg); }
            20% { transform: skew(-2deg); }
            21% { transform: skew(3deg); }
            22% { transform: skew(0deg); }
        }
    </style>
</head>
<body>

    <div class="bg-lines"></div>

    <div class="hud-terminal">
        <div class="hud-header">
            <div class="brand-zone">
                <div class="team-title">5DMAX</div>
            </div>
            <div class="team-meta-stats">
                <div class="meta-box"><div class="meta-label">AVG ELO</div><div class="meta-val" id="avg-elo">1769</div></div>
                <div class="meta-box"><div class="meta-label">ROSTER STATUS</div><div class="meta-val" style="color: #4ade80; font-size: 14px;">● ONLINE</div></div>
            </div>
        </div>

        <div class="roster-grid" id="lineup">
            <div style="color: #64748b; padding: 50px; grid-column: span 5; text-align: center; font-size: 14px; letter-spacing: 2px; text-transform: uppercase;">Загрузка данных...</div>
        </div>
    </div>

    <script>
        const API_KEY = "db82dc3b-da7c-49ed-a80a-f7c2880b623e";
        
        // 🛠 СЮДА ПРОПИСЫВАЙ НАЗВАНИЯ СВОИХ ФАЙЛОВ КАРТИНОК
        const players = [
            { nickname: "Magistr333", role: "IGL", defaultLvl: 8, defaultElo: 1637, defaultHs: "48%", photo: "magistr.png" },
            { nickname: "DZAGAA", role: "AWP", defaultLvl: 9, defaultElo: 1898, defaultHs: "38%", photo: "dzaga.png" },
            { nickname: "Sazanchiks", role: "Rifler", defaultLvl: 10, defaultElo: 2012, defaultHs: "52%", photo: "sazan.png" },
            { nickname: "ArtemLob1", role: "Rifler", defaultLvl: 8, defaultElo: 1532, defaultHs: "46%", photo: "artem.png" }
        ];

        async function fetchPlayerData(nickname) {
            try {
                const pRes = await fetch(`https://open.faceit.com/data/v4/players?nickname=${nickname}`, {
                    headers: { 'Authorization': `Bearer ${API_KEY}` }
                });
                if (!pRes.ok) return null;
                const pData = await pRes.json();
                const playerId = pData.player_id;

                const hRes = await fetch(`https://open.faceit.com/data/v4/players/${playerId}/history?game=cs2&limit=30`, {
                    headers: { 'Authorization': `Bearer ${API_KEY}` }
                });
                
                let kd = "—"; let winRate = "—"; let hs = "—";
                
                if (hRes.ok) {
                    const hData = await hRes.json();
                    
                    if (hData.items && hData.items.length > 0) {
                        const matches = hData.items;
                        let matchCount = 0;
                        let wins = 0;
                        
                        matches.forEach(match => {
                            if (match.status === "FINISHED") {
                                const playerTeam = match.results?.teams?.find(t => 
                                    t.players?.some(p => p.player_id === playerId)
                                );
                                if (playerTeam && playerTeam.winner) {
                                    wins++;
                                }
                                matchCount++;
                            }
                        });

                        const segRes = await fetch(`https://open.faceit.com/data/v4/players/${playerId}/stats/cs2`, {
                            headers: { 'Authorization': `Bearer ${API_KEY}` }
                        });
                        
                        if (segRes.ok) {
                            const segData = await segRes.json();
                            const recentResults = segData.lifetime["Recent Results"] || [];
                            if (recentResults.length > 0) {
                                const recentWins = recentResults.filter(r => r === "1").length;
                                winRate = Math.round((recentWins / recentResults.length) * 100) + "%";
                            } else {
                                winRate = segData.lifetime["Win Rate %"] ? segData.lifetime["Win Rate %"] + "%" : "—";
                            }
                            
                            const avgKd = parseFloat(segData.lifetime["Average K/D Ratio"]) || 0;
                            
                            if (recentResults.length > 0) {
                                const winFactor = (recentResults.filter(r => r === "1").length) / recentResults.length;
                                if (winFactor < 0.4) {
                                    kd = (avgKd * 0.85).toFixed(2);
                                } else {
                                    kd = avgKd.toFixed(2);
                                }
                            } else {
                                kd = avgKd.toFixed(2);
                            }
                            
                            hs = segData.lifetime["Average Headshots %"] ? segData.lifetime["Average Headshots %"] + "%" : "—";
                        }
                    }
                }
                
                return {
                    nickname: pData.nickname,
                    lvl: pData.games.cs2?.skill_level || pData.games.csgo?.skill_level || "—",
                    elo: pData.games.cs2?.faceit_elo || pData.games.csgo?.faceit_elo || "—",
                    stats: { kd, hs, winRate }
                };
            } catch (e) { 
                console.error(e);
                return null; 
            }
        }

        async function buildLineup() {
            const lineupDiv = document.getElementById("lineup");
            let html = "";
            let totalElo = 0;
            let countElo = 0;

            for (let p of players) {
                let data = null;
                if (window.location.protocol !== 'file:') {
                    data = await fetchPlayerData(p.nickname);
                }

                const finalLvl = data ? data.lvl : p.defaultLvl;
                const finalElo = data ? data.elo : p.defaultElo;
                
                if (Number(finalElo)) {
                    totalElo += Number(finalElo);
                    countElo++;
                }

                // Логика отображения твоих собственных фото вместо FACEIT
                const avatarHtml = p.photo 
                    ? `<img src="${p.photo}" class="avatar-img" alt="${p.nickname}" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\"avatar-placeholder\">${p.nickname.charAt(0)}</div>';">`
                    : `<div class="avatar-placeholder">${p.nickname.charAt(0)}</div>`;
                
                const kd = data ? data.stats.kd : "1.09"; 
                const hsStr = data ? data.stats.hs : p.defaultHs;
                const wrStr = data ? data.stats.winRate : "54%";
                const hsNum = parseInt(hsStr) || 0;
                const wrNum = parseInt(wrStr) || 0;

                let lvlClass = 'l-8'; let cardLvlClass = 'card-lvl-8'; let eloNumClass = 'num-lvl-8';
                if (finalLvl == 10) { lvlClass = 'l-10'; cardLvlClass = 'card-lvl-10'; eloNumClass = 'num-lvl-10'; }
                else if (finalLvl == 9) { lvlClass = 'l-9'; cardLvlClass = 'card-lvl-9'; eloNumClass = 'num-lvl-9'; }

                const kdClass = parseFloat(kd) >= 1.0 ? 'kd-hud-tag kd-godlike' : 'kd-hud-tag';

                html += `
                    <div class="tilt-card ${cardLvlClass}">
                        <a href="https://www.faceit.com/ru/players/${p.nickname}" target="_blank" class="card-inner-link">
                            <div class="level-badge-3d ${lvlClass}">${finalLvl}</div>
                            <div class="avatar-frame">
                                ${avatarHtml}
                            </div>
                            <div class="info-frame">
                                <div class="p-nick">${p.nickname}</div>
                                <div class="p-position">${p.role}</div>
                            </div>
                            <div class="stats-frame">
                                <div class="elo-premium-block">
                                    <div class="elo-label-group">
                                        <span class="elo-main-label">ELO RATING</span>
                                        <span class="elo-sub-label">Faceit Points</span>
                                    </div>
                                    <span class="elo-value ${eloNumClass}">${finalElo}</span>
                                </div>

                                <div class="stat-row-premium"><span>K/D</span><span class="${kdClass}">${kd}</span></div>
                                
                                <div class="stat-block-premium">
                                    <div class="stat-row-premium"><span>Headshots</span><span class="value-premium">${hsStr}</span></div>
                                    <div class="bar-bg"><div class="bar-fill" style="width: ${hsNum}%"></div></div>
                                </div>
                                
                                <div class="stat-block-premium">
                                    <div class="stat-row-premium"><span>Win Rate</span><span class="value-premium">${wrStr}</span></div>
                                    <div class="bar-bg"><div class="bar-fill" style="width: ${wrNum}%; background: linear-gradient(90deg, #4ade80, #22c55e)"></div></div>
                                </div>
                            </div>
                        </a>
                    </div>
                `;
            }

            html += `
                <div class="tilt-card searching-node">
                    <div class="search-glitch">В поиске</div>
                    <div class="p-position" style="margin-top: 8px;">[ 5th slots active ]</div>
                </div>
            `;

            lineupDiv.innerHTML = html;

            if (countElo > 0) {
                document.getElementById("avg-elo").innerText = Math.round(totalElo / countElo);
            }
        }

        buildLineup();
    </script>
</body>
</html>
