<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5DMAX Team Profile</title>
    <style>
        /* Анимированный футуристичный фон */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #0f1115 0%, #161920 50%, #0d0e12 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #d3d7db; 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 90vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Контейнер в стиле Glassmorphism */
        .hltv-container { 
            width: 100%; 
            max-width: 1000px; 
            background: rgba(35, 42, 54, 0.3); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05); 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
        }
        
        /* Шапка команды */
        .team-header { 
            background: rgba(45, 56, 72, 0.4); 
            padding: 20px 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .team-name { 
            color: #ffffff; 
            font-weight: 900; 
            font-size: 22px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px;
            background: linear-gradient(45deg, #fff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Сетка */
        .lineup-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            background: rgba(20, 26, 35, 0.2); 
            padding: 20px; 
            gap: 15px; 
        }
        
        /* Интерактивная карточка игрока */
        .player-card { 
            background: rgba(30, 37, 49, 0.45); 
            border: 1px solid rgba(255, 255, 255, 0.03); 
            border-radius: 8px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            position: relative; 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            transform: translateY(0);
        }
        .player-link { text-decoration: none; color: inherit; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        /* Эффект наведения (Hover) */
        .player-card:hover {
            transform: translateY(-8px);
            background: rgba(35, 45, 60, 0.6);
            border-color: rgba(255, 255, 255, 0.1);
        }

        /* Динамический неон под новые цвета уровней */
        .card-lvl-10:hover { box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4); border-color: rgba(239, 68, 68, 0.3); }
        .card-lvl-9:hover { box-shadow: 0 10px 30px rgba(255, 102, 0, 0.25); border-color: rgba(255, 102, 0, 0.2); }
        .card-lvl-8:hover { box-shadow: 0 10px 30px rgba(255, 136, 0, 0.2); border-color: rgba(255, 136, 0, 0.15); }

        /* Фото игрока и зум */
        .avatar-container { 
            width: 100%; 
            aspect-ratio: 1/1; 
            background-color: rgba(15, 18, 24, 0.5); 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        .player-avatar { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.4s ease;
        }
        .player-card:hover .player-avatar {
            transform: scale(1.08);
        }
        .no-avatar { font-size: 46px; color: #2d3848; font-weight: bold; text-transform: uppercase; }

        /* Мета */
        .player-meta { padding: 12px 5px; width: 100%; box-sizing: border-box; background: rgba(38, 46, 60, 0.5); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .player-name { color: #ffffff; font-weight: bold; font-size: 15px; }
        .player-role { color: #8a96a8; font-size: 11px; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Статистика */
        .player-stats { padding: 12px 10px; width: 100%; box-sizing: border-box; font-size: 12px; display: flex; flex-direction: column; gap: 6px; background: rgba(25, 30, 39, 0.3); }
        .stat-row { display: flex; justify-content: space-between; color: #8a96a8; }
        .stat-value { color: #ffffff; font-weight: bold; }

        /* Кастомные плашки уровней (10 уровень теперь КРАСНЫЙ) */
        .lvl-badge { 
            position: absolute; top: 8px; right: 8px; width: 26px; height: 26px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: #fff; border-radius: 4px; font-size: 12px; z-index: 2; 
        }
        .lvl-10 { background: #ef4444; box-shadow: 0 0 10px #ef4444; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
        .lvl-9 { background: #ff6600; box-shadow: 0 0 5px rgba(255, 102, 0, 0.5); }
        .lvl-8 { background: #ff8800; }

        /* Карточка "В поиске" */
        .searching-card { 
            border: 1px dashed rgba(91, 166, 44, 0.4); 
            background: rgba(20, 30, 20, 0.2); 
            justify-content: center; 
            min-height: 250px; 
        }
        .searching-card:hover {
            border-color: #5ba62c;
            box-shadow: 0 10px 35px rgba(91, 166, 44, 0.25);
            background: rgba(20, 35, 20, 0.35);
        }
        .searching-text { 
            color: #5ba62c; 
            font-weight: 900; 
            font-size: 15px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            padding: 10px;
            animation: pulseNeon 2s infinite alternate;
        }
        @keyframes pulseNeon {
            0% { text-shadow: 0 0 5px rgba(91, 166, 44, 0.5); }
            100% { text-shadow: 0 0 15px rgba(91, 166, 44, 1), 0 0 20px rgba(91, 166, 44, 0.4); }
        }
    </style>
</head>
<body>

    <div class="hltv-container">
        <div class="team-header">
            <div class="team-info">
                <div class="team-name">5DMAX</div>
            </div>
        </div>

        <div class="lineup-grid" id="lineup">
            <div style="color: #8a96a8; padding: 30px; grid-column: span 5; text-align: center; font-size: 14px; letter-spacing: 1px;">Загрузка актуальной статистики аимеров...</div>
        </div>
    </div>

    <script>
        const API_KEY = "db82dc3b-da7c-49ed-a80a-f7c2880b623e";
        
        const players = [
            { nickname: "Magistr333", role: "IGL", defaultLvl: 8, defaultElo: 1637, defaultHs: "48%" },
            { nickname: "DZAGAA", role: "AWP", defaultLvl: 9, defaultElo: 1898, defaultHs: "38%" },
            { nickname: "Sazanchiks", role: "Rifler", defaultLvl: 10, defaultElo: 2012, defaultHs: "52%" },
            { nickname: "ArtemLob1", role: "Rifler", defaultLvl: 8, defaultElo: 1532, defaultHs: "46%" }
        ];

        async function fetchPlayerData(nickname) {
            try {
                const pRes = await fetch(`https://open.faceit.com/data/v4/players?nickname=${nickname}`, {
                    headers: { 'Authorization': `Bearer ${API_KEY}` }
                });
                if (!pRes.ok) return null;
                const pData = await pRes.json();
                const playerId = pData.player_id;

                const sRes = await fetch(`https://open.faceit.com/data/v4/players/${playerId}/stats/cs2`, {
                    headers: { 'Authorization': `Bearer ${API_KEY}` }
                });
                
                let kd = "—";
                let winRate = "—";
                let hs = "—";
                
                if (sRes.ok) {
                    const sData = await sRes.json();
                    kd = sData.lifetime["Average K/D Ratio"] || "—";
                    winRate = sData.lifetime["Win Rate %"] ? sData.lifetime["Win Rate %"] + "%" : "—";
                    hs = sData.lifetime["Average Headshots %"] ? sData.lifetime["Average Headshots %"] + "%" : "—";
                }

                return {
                    nickname: pData.nickname,
                    avatar: pData.avatar || "",
                    lvl: pData.games.cs2?.skill_level || pData.games.csgo?.skill_level || "—",
                    elo: pData.games.cs2?.faceit_elo || pData.games.csgo?.faceit_elo || "—",
                    stats: { kd, hs, winRate }
                };
            } catch (e) {
                return null;
            }
        }

        async function buildLineup() {
            const lineupDiv = document.getElementById("lineup");
            let html = "";

            for (let p of players) {
                let data = null;
                if (window.location.protocol !== 'file:') {
                    data = await fetchPlayerData(p.nickname);
                }

                const finalLvl = data ? data.lvl : p.defaultLvl;
                const finalElo = data ? data.elo : p.defaultElo;
                const avatarHtml = (data && data.avatar) 
                    ? `<img src="${data.avatar}" class="player-avatar" alt="${p.nickname}">`
                    : `<div class="no-avatar">${p.nickname.charAt(0)}</div>`;
                
                const kd = data ? data.stats.kd : "1.09"; 
                const hs = data ? data.stats.hs : p.defaultHs;
                const wr = data ? data.stats.winRate : "54%";

                let lvlClass = 'lvl-8';
                let cardLvlClass = 'card-lvl-8';
                if (finalLvl == 10) {
                    lvlClass = 'lvl-10';
                    cardLvlClass = 'card-lvl-10';
                } else if (finalLvl == 9) {
                    lvlClass = 'lvl-9';
                    cardLvlClass = 'card-lvl-9';
                }

                html += `
                    <div class="player-card ${cardLvlClass}">
                        <a href="https://www.faceit.com/ru/players/${p.nickname}" target="_blank" class="player-link">
                            <div class="lvl-badge ${lvlClass}">${finalLvl}</div>
                            <div class="avatar-container">
                                ${avatarHtml}
                            </div>
                            <div class="player-meta">
                                <div class="player-name">${p.nickname}</div>
                                <div class="player-role">${p.role}</div>
                            </div>
                            <div class="player-stats">
                                <div class="stat-row"><span>ELO</span><span class="stat-value" style="color: #a5b4fc">${finalElo}</span></div>
                                <div class="stat-row"><span>K/D Ratio</span><span class="stat-value" style="color: ${kd >= 1 ? '#5ba62c' : '#ef4444'}">${kd}</span></div>
                                <div class="stat-row"><span>Headshots</span><span class="stat-value">${hs}</span></div>
                                <div class="stat-row"><span>Win Rate</span><span class="stat-value">${wr}</span></div>
                            </div>
                        </a>
                    </div>
                `;
            }

            html += `
                <div class="player-card searching-card">
                    <div class="searching-text">В поиске</div>
                    <div class="player-role" style="color: #8a96a8; font-style: italic;">5th player</div>
                </div>
            `;

            lineupDiv.innerHTML = html;
        }

        buildLineup();
    </script>
</body>
</html>
