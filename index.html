<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>5DMAX Team Profile</title>
    <style>
        /* Базовые стили и анимированный фон */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #0f1115 0%, #161920 50%, #0d0e12 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #d3d7db; 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            min-height: 90vh;
            position: relative;
        }

        /* Киберспортивная технологичная сетка на фоне */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 30px 30px;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Контейнер в стиле Glassmorphism */
        .hltv-container { 
            width: 100%; 
            max-width: 1000px; 
            background: rgba(25, 32, 44, 0.35); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.07); 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            z-index: 1;
        }
        
        /* Прокачанная шапка команды */
        .team-header { 
            background: rgba(35, 45, 60, 0.5); 
            padding: 25px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid rgba(255, 255, 255, 0.08); 
        }
        .team-name { 
            color: #ffffff; 
            font-weight: 900; 
            font-size: 26px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            background: linear-gradient(45deg, #ffffff, #ef4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.3));
        }

        /* Сетка карточек */
        .lineup-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            background: rgba(15, 20, 28, 0.25); 
            padding: 25px; 
            gap: 20px; 
        }
        
        /* Карточка игрока */
        .player-card { 
            background: rgba(28, 35, 48, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.04); 
            border-radius: 12px; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            text-align: center; 
            position: relative; 
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .player-link { text-decoration: none; color: inherit; width: 100%; display: flex; flex-direction: column; align-items: center; }
        
        /* Эффекты наведения */
        .player-card:hover {
            transform: translateY(-10px);
            background: rgba(32, 42, 58, 0.7);
            border-color: rgba(255, 255, 255, 0.15);
        }

        /* Неоновая подсветка уровней */
        .card-lvl-10:hover { box-shadow: 0 15px 35px rgba(239, 68, 68, 0.4); border-color: rgba(239, 68, 68, 0.4); }
        .card-lvl-9:hover { box-shadow: 0 15px 35px rgba(255, 102, 0, 0.25); border-color: rgba(255, 102, 0, 0.3); }
        .card-lvl-8:hover { box-shadow: 0 15px 35px rgba(255, 136, 0, 0.2); border-color: rgba(255, 136, 0, 0.25); }

        /* Аватарки */
        .avatar-container { 
            width: 100%; 
            aspect-ratio: 1/1; 
            background-color: rgba(10, 12, 18, 0.6); 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
        }
        .player-avatar { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.4s ease;
        }
        .player-card:hover .player-avatar { transform: scale(1.08); }
        .no-avatar { font-size: 48px; color: #38465c; font-weight: bold; }

        /* Мета игроков */
        .player-meta { padding: 14px 5px; width: 100%; box-sizing: border-box; background: rgba(35, 44, 59, 0.6); border-bottom: 1px solid rgba(255, 255, 255, 0.06); }
        .player-name { color: #ffffff; font-weight: bold; font-size: 16px; letter-spacing: 0.5px; }
        .player-role { color: #94a3b8; font-size: 11px; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        /* Прокачанная статистика */
        .player-stats { padding: 15px 12px; width: 100%; box-sizing: border-box; font-size: 12px; display: flex; flex-direction: column; gap: 10px; background: rgba(20, 26, 36, 0.4); }
        .stat-row { display: flex; justify-content: space-between; align-items: center; color: #94a3b8; }
        .stat-value { color: #ffffff; font-weight: bold; }

        /* Светящийся тег K/D */
        .kd-tag {
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
        }
        .kd-high {
            background: rgba(91, 166, 44, 0.15);
            color: #5ba62c;
            box-shadow: 0 0 8px rgba(91, 166, 44, 0.2);
        }

        /* Полоски прогресса (Progress Bars) */
        .progress-container {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            border-radius: 2px;
            margin-top: 3px;
            overflow: hidden;
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #a5b4fc, #6366f1);
            border-radius: 2px;
        }

        /* Плашки уровней */
        .lvl-badge { 
            position: absolute; top: 10px; right: 10px; width: 28px; height: 28px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 900; color: #fff; border-radius: 6px; font-size: 13px; z-index: 2; 
        }
        .lvl-10 { background: #ef4444; box-shadow: 0 0 12px #ef4444; text-shadow: 0 1px 2px rgba(0,0,0,0.6); }
        .lvl-9 { background: #ff6600; box-shadow: 0 0 6px rgba(255, 102, 0, 0.5); }
        .lvl-8 { background: #ff8800; }

        /* Карточка "В поиске" */
        .searching-card { 
            border: 1px dashed rgba(91, 166, 44, 0.4); 
            background: rgba(18, 28, 18, 0.25); 
            justify-content: center; 
            min-height: 290px; 
        }
        .searching-card:hover {
            border-color: #5ba62c;
            box-shadow: 0 15px 40px rgba(91, 166, 44, 0.3);
            background: rgba(20, 38, 20, 0.4);
        }
        .searching-text { 
            color: #5ba62c; 
            font-weight: 900; 
            font-size: 15px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            padding: 10px;
            animation: pulseNeon 2s infinite alternate;
        }
        @keyframes pulseNeon {
            0% { text-shadow: 0 0 5px rgba(91, 166, 44, 0.4); }
            100% { text-shadow: 0 0 15px rgba(91, 166, 44, 0.9); }
        }
    </style>
</head>
<body>

    <div class="hltv-container">
        <div class="team-header">
            <div class="team-name">5DMAX</div>
        </div>

        <div class="lineup-grid" id="lineup">
            <div style="color: #94a3b8; padding: 40px; grid-column: span 5; text-align: center; font-size: 14px; letter-spacing: 1px;">Синхронизация с серверами FACEIT...</div>
        </div>
    </div>

    <script>
        const API_KEY = "db82dc3b-da7c-49ed-a80a-f7c2880b623e";
        
        const players = [
            { nickname: "Magistr333", role: "IGL", defaultLvl: 8, defaultElo: 1637, defaultHs: "48%" },
            { nickname: "DZAGAA", role: "AWP", defaultLvl: 9, defaultElo: 1898, defaultHs: "38%" },
            { nickname: "Sazanchiks", role: "Rifler", defaultLvl: 10, defaultElo: 2012, defaultHs: "52%" },
            { nickname: "ArtemLob1", role: "Rifler", defaultLvl: 8, defaultElo: 1532, defaultHs: "46%" }
        ];

        async function fetchPlayerData(nickname) {
            try {
                const pRes = await fetch(`https://open.faceit.com/data/v4/players?nickname=${nickname}`, {
                    headers: { 'Authorization': `Bearer ${API_KEY}` }
                });
                if (!pRes.ok) return null;
                const pData = await pRes.json();
                const playerId = pData.player_id;

                const sRes = await fetch(`https://open.faceit.com/data/v4/players/${playerId}/stats/cs2`, {
                    headers: { 'Authorization': `Bearer ${API_KEY}` }
                });
                
                let kd = "—";
                let winRate = "—";
                let hs = "—";
                
                if (sRes.ok) {
                    const sData = await sRes.json();
                    kd = sData.lifetime["Average K/D Ratio"] || "—";
                    winRate = sData.lifetime["Win Rate %"] ? sData.lifetime["Win Rate %"] + "%" : "—";
                    hs = sData.lifetime["Average Headshots %"] ? sData.lifetime["Average Headshots %"] + "%" : "—";
                }

                return {
                    nickname: pData.nickname,
                    avatar: pData.avatar || "",
                    lvl: pData.games.cs2?.skill_level || pData.games.csgo?.skill_level || "—",
                    elo: pData.games.cs2?.faceit_elo || pData.games.csgo?.faceit_elo || "—",
                    stats: { kd, hs, winRate }
                };
            } catch (e) {
                return null;
            }
        }

        async function buildLineup() {
            const lineupDiv = document.getElementById("lineup");
            let html = "";

            for (let p of players) {
                let data = null;
                if (window.location.protocol !== 'file:') {
                    data = await fetchPlayerData(p.nickname);
                }

                const finalLvl = data ? data.lvl : p.defaultLvl;
                const finalElo = data ? data.elo : p.defaultElo;
                const avatarHtml = (data && data.avatar) 
                    ? `<img src="${data.avatar}" class="player-avatar" alt="${p.nickname}">`
                    : `<div class="no-avatar">${p.nickname.charAt(0)}</div>`;
                
                const kd = data ? data.stats.kd : "1.09"; 
                const hsStr = data ? data.stats.hs : p.defaultHs;
                const wrStr = data ? data.stats.winRate : "54%";

                const hsNum = parseInt(hsStr) || 0;
                const wrNum = parseInt(wrStr) || 0;

                let lvlClass = 'lvl-8';
                let cardLvlClass = 'card-lvl-8';
                if (finalLvl == 10) {
                    lvlClass = 'lvl-10';
                    cardLvlClass = 'card-lvl-10';
                } else if (finalLvl == 9) {
                    lvlClass = 'lvl-9';
                    cardLvlClass = 'card-lvl-9';
                }

                const kdClass = parseFloat(kd) >= 1.0 ? 'kd-tag kd-high' : 'kd-tag';

                html += `
                    <div class="player-card ${cardLvlClass}">
                        <a href="https://www.faceit.com/ru/players/${p.nickname}" target="_blank" class="player-link">
                            <div class="lvl-badge ${lvlClass}">${finalLvl}</div>
                            <div class="avatar-container">
                                ${avatarHtml}
                            </div>
                            <div class="player-meta">
                                <div class="player-name">${p.nickname}</div>
                                <div class="player-role">${p.role}</div>
                            </div>
                            <div class="player-stats">
                                <div class="stat-row"><span>ELO</span><span class="stat-value" style="color: #a5b4fc">${finalElo}</span></div>
                                <div class="stat-row"><span>K/D Ratio</span><span class="${kdClass}">${kd}</span></div>
                                
                                <div class="stat-block">
                                    <div class="stat-row"><span>Headshots</span><span class="stat-value">${hsStr}</span></div>
                                    <div class="progress-container"><div class="progress-bar" style="width: ${hsNum}%"></div></div>
                                </div>
                                
                                <div class="stat-block">
                                    <div class="stat-row"><span>Win Rate</span><span class="stat-value">${wrStr}</span></div>
                                    <div class="progress-container"><div class="progress-bar" style="width: ${wrNum}%; background: linear-gradient(90deg, #34d399, #059669)"></div></div>
                                </div>
                            </div>
                        </a>
                    </div>
                `;
            }

            html += `
                <div class="player-card searching-card">
                    <div class="searching-text">В поиске</div>
                    <div class="player-role" style="color: #94a3b8; font-style: italic;">5th player</div>
                </div>
            `;

            lineupDiv.innerHTML = html;
        }

        buildLineup();
    </script>
</body>
</html>
